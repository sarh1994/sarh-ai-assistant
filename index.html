<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مساعد صرح المحاسبي الذكي</title>

<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:Tahoma,Arial,sans-serif;
background:linear-gradient(135deg,#7f1d1d,#991b1b);
  color:#111827
}
.app{
max-width:1250px;
margin:20px auto;
background:#fff;
border-radius:24px;
overflow:hidden;
box-shadow:0 20px 50px rgba(0,0,0,.35)
}
.header{
background:linear-gradient(135deg,#7f1d1d,#991b1b);
  color:white;
padding:28px;
text-align:center
}
.header h1{margin:0;font-size:34px}
.header p{margin:10px 0 0;color:#cbd5e1}
.main{
display:grid;
grid-template-columns:300px 1fr;
min-height:720px
}
.side{
background:#f8fafc;
border-left:1px solid #e5e7eb;
padding:18px
}
.side button{
display:block;
width:100%;
margin:8px 0;
padding:14px;
border:0;
border-radius:14px;
background:#e2e8f0;
cursor:pointer;
text-align:right;
font-size:15px
}
.side button:hover{background:#cbd5e1}
.content{padding:24px}
.card{
background:#f8fafc;
border:1px solid #e5e7eb;
border-radius:18px;
padding:18px;
margin:14px 0;
line-height:1.9
}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:14px
}
input,select,textarea{
width:100%;
padding:13px;
border:1px solid #cbd5e1;
border-radius:12px;
font-size:15px;
margin:6px 0
}
button.send{
background:#991b1b;
  color:white;
border:0;
border-radius:12px;
padding:13px 22px;
cursor:pointer;
margin-top:8px
}
button.send:hover{background:#1e293b}
.result{
background:white;
border:1px solid #cbd5e1;
border-radius:15px;
padding:18px;
white-space:pre-wrap;
line-height:1.9
}
.badge{
display:inline-block;
background:#dbeafe;
color:#1e3a8a;
padding:6px 10px;
border-radius:999px;
font-size:13px;
margin:4px
}
.small{color:#64748b;font-size:13px}
.chat{
height:430px;
overflow:auto;
background:#f8fafc;
border:1px solid #e5e7eb;
border-radius:18px;
padding:15px
}
.msg{
padding:13px 15px;
border-radius:15px;
margin:10px 0;
line-height:1.8;
white-space:pre-wrap
}
.user{background:#dbeafe;margin-right:22%}
.bot{background:white;border:1px solid #ddd;margin-left:22%}
.input-row{display:flex;gap:10px;margin-top:12px}
.input-row input{flex:1}
.table{
width:100%;
border-collapse:collapse;
background:white;
border-radius:12px;
overflow:hidden
}
.table th,.table td{
border:1px solid #e5e7eb;
padding:10px;
text-align:right
}
.table th{background:#e2e8f0}
@media(max-width:850px){
.main{grid-template-columns:1fr}
.side{border-left:0;border-bottom:1px solid #e5e7eb}
}
</style>
</head>

<body>

<div class="app">
<div class="header">
<h1>مساعد صرح المحاسبي الذكي Pro</h1>
<p>منصة تدريب محاسبي مجانية: قيود، ضرائب، رواتب، تسويات، تحليل مالي، وشجرة حسابات</p>
</div>

<div class="main">

<div class="side">
<button onclick="showHome()">الرئيسية</button>
<button onclick="showDailyAssistant()">مساعد المحاسب اليومي</button>
<button onclick="showJournal()">مولد القيود المحاسبية Pro</button>
<button onclick="showAccounts()">شجرة الحسابات الذكية</button>
<button onclick="showSalary()">حاسبة الرواتب والضمان</button>
<button onclick="showIncomeTax()">حاسبة ضريبة الدخل للأفراد</button>
<button onclick="showSalesTax()">حاسبة ضريبة المبيعات</button>
<button onclick="showBank()">مذكرة تسوية البنك</button>
<button onclick="showFinancialAnalysis()">التحليل المالي</button>
<button onclick="showCompanySetup()">تأسيس شركة محاسبياً</button>
<button onclick="showTraining()">تدريب عملي</button>
<button onclick="showFAQ()">بنك الأسئلة</button>
</div>

<div class="content" id="content"></div>

</div>
</div>

<script>
function layout(title, html){
document.getElementById("content").innerHTML = `<h2>${title}</h2>${html}`;
}

/* الرئيسية */
function showHome(){
layout("لوحة التحكم الرئيسية", `
<div class="grid">
<div class="card"><h3>📘 القيود المحاسبية</h3>مولد قيود متقدم لمبيعات، مشتريات، رواتب، بنوك، شيكات، أصول، قروض، ضرائب.</div>
<div class="card"><h3>💰 الضرائب والرواتب</h3>حاسبة ضريبة دخل أفراد، ضريبة مبيعات، صافي راتب، وضمان اجتماعي.</div>
<div class="card"><h3>🏦 البنوك والتسويات</h3>إعداد مذكرة تسوية بنك مع الفروقات والرصيد المعدل.</div>
<div class="card"><h3>📊 التحليل المالي</h3>نسب السيولة، الربحية، المديونية، وهامش الربح.</div>
</div>

<div class="card">
<span class="badge">مجاني 100%</span>
<span class="badge">بدون API</span>
<span class="badge">يعمل على GitHub Pages</span>
<span class="badge">مناسب لدورة المحاسبة العملية</span>
</div>
`);
}

/* مساعد يومي */
const smartEntries = [
{keys:["شراء بضاعة نقدا","اشتريت بضاعة نقدا","شراء نقدي"],ans:"من حـ/ المشتريات أو المخزون\nإلى حـ/ الصندوق\n\nالشرح: شراء بضاعة وتم الدفع نقداً."},
{keys:["شراء بضاعة على الحساب","اشتريت بضاعة على الحساب","شراء آجل"],ans:"من حـ/ المشتريات أو المخزون\nإلى حـ/ الموردين\n\nالشرح: شراء بضاعة من المورد ولم يتم الدفع فوراً."},
{keys:["بيع نقدي","بعت نقدا","مبيعات نقدية"],ans:"من حـ/ الصندوق\nإلى حـ/ المبيعات\nإلى حـ/ ضريبة المبيعات المستحقة إن وجدت"},
{keys:["بيع على الحساب","مبيعات آجلة","بعت على الحساب"],ans:"من حـ/ العملاء\nإلى حـ/ المبيعات\nإلى حـ/ ضريبة المبيعات المستحقة إن وجدت"},
{keys:["تحصيل من عميل","قبض من عميل","استلام من عميل"],ans:"من حـ/ الصندوق أو البنك\nإلى حـ/ العملاء"},
{keys:["دفع لمورد","سداد مورد","دفعت لمورد"],ans:"من حـ/ الموردين\nإلى حـ/ الصندوق أو البنك"},
{keys:["راتب","رواتب","قيد الرواتب"],ans:"من حـ/ مصروف الرواتب والأجور\nإلى حـ/ اقتطاعات الضمان الاجتماعي\nإلى حـ/ ضريبة الدخل على الرواتب إن وجدت\nإلى حـ/ البنك أو الصندوق"},
{keys:["ايجار","إيجار","دفع ايجار"],ans:"من حـ/ مصروف الإيجار\nإلى حـ/ الصندوق أو البنك"},
{keys:["استهلاك","اهلاك","إهلاك"],ans:"من حـ/ مصروف الإهلاك\nإلى حـ/ مجمع الإهلاك"},
{keys:["عمولة بنك","عمولات بنكية","مصاريف بنك"],ans:"من حـ/ مصاريف وعمولات بنكية\nإلى حـ/ البنك"}
];

function showDailyAssistant(){
layout("مساعد المحاسب اليومي", `
<div class="chat" id="chat">
<div class="msg bot">اكتب العملية المالية بلغة بسيطة، وأنا أعطيك القيد المناسب.
مثال: اشتريت بضاعة نقداً بقيمة 5000 دينار</div>
</div>
<div class="input-row">
<input id="dailyQ" placeholder="اكتب العملية هنا..." onkeydown="if(event.key==='Enter') dailyAsk()">
<button class="send" onclick="dailyAsk()">تحليل العملية</button>
</div>
<p class="small">هذه أداة تدريبية تعتمد على كلمات مفتاحية بدون API.</p>
`);
}

function dailyAsk(){
let q=document.getElementById("dailyQ").value.trim();
if(!q)return;
let chat=document.getElementById("chat");
chat.innerHTML+=`<div class="msg user">${q}</div>`;
let reply="لم أتعرف على العملية بدقة. جرّب كلمات مثل: شراء بضاعة، بيع نقدي، تحصيل من عميل، رواتب، إيجار، إهلاك.";
for(let item of smartEntries){
if(item.keys.some(k=>q.includes(k))){
reply=item.ans;
break;
}
}
chat.innerHTML+=`<div class="msg bot">${reply}</div>`;
document.getElementById("dailyQ").value="";
chat.scrollTop=chat.scrollHeight;
}

function showJournal(){
let options="";
for(let key in entries){
options+=`<option value="${key}">${entries[key][0]}</option>`;
}
layout("مولد القيود المحاسبية Pro", `
<div class="card">
<select id="entryType">${options}</select>
<input id="amount" type="number" placeholder="المبلغ بالدينار">
<button class="send" onclick="makeEntry()">إنشاء القيد</button>
</div>
<div id="entryResult" class="result">اختر نوع العملية وأدخل المبلغ.</div>
`);
}

function makeEntry(){
let key=document.getElementById("entryType").value;
let amount=document.getElementById("amount").value || "____";
let title=entries[key][0];
let text=entries[key][1].replaceAll("{a}",amount);
document.getElementById("entryResult").innerText=`${title}\n\n${text}\n\nملاحظة: قد تختلف المعالجة حسب طبيعة الشركة وسياساتها المحاسبية.`;
}

/* الرواتب */
function showSalary(){
layout("حاسبة الرواتب والضمان", `
<div class="grid">
<div class="card">
<input id="basicSalary" type="number" placeholder="الراتب الأساسي">
<input id="allowances" type="number" placeholder="بدلات">
<input id="otherDeduct" type="number" placeholder="اقتطاعات أخرى">
<button class="send" onclick="calcSalary()">احسب الراتب</button>
</div>
<div id="salaryResult" class="result"></div>
</div>
<p class="small">نسبة الضمان للموظف هنا 7.5% كأداة تدريبية قابلة للتعديل.</p>
`);
}

function calcSalary(){
let basic=Number(document.getElementById("basicSalary").value||0);
let allowances=Number(document.getElementById("allowances").value||0);
let other=Number(document.getElementById("otherDeduct").value||0);
let gross=basic+allowances;
let social=gross*0.075;
let net=gross-social-other;
document.getElementById("salaryResult").innerText=
`الراتب الأساسي: ${basic.toFixed(2)}
البدلات: ${allowances.toFixed(2)}
إجمالي الراتب: ${gross.toFixed(2)}
اقتطاع الضمان 7.5%: ${social.toFixed(2)}
اقتطاعات أخرى: ${other.toFixed(2)}
صافي الراتب: ${net.toFixed(2)}

قيد الرواتب:
من حـ/ مصروف الرواتب والأجور ${gross.toFixed(2)}
إلى حـ/ أمانات الضمان الاجتماعي ${social.toFixed(2)}
إلى حـ/ اقتطاعات أخرى ${other.toFixed(2)}
إلى حـ/ البنك أو الصندوق ${net.toFixed(2)}`;
}

/* ضريبة الدخل */
function showIncomeTax(){
layout("حاسبة ضريبة الدخل الأردني للأفراد", `
<div class="card">
<select id="incomeType">
<option value="monthly">دخل شهري</option>
<option value="annual">دخل سنوي</option>
</select>
<input id="income" type="number" placeholder="الدخل بالدينار">
<input id="personalExemption" type="number" value="9000" placeholder="الإعفاء الشخصي">
<input id="familyExemption" type="number" value="0" placeholder="إعفاء المعالين">
<input id="extraExemption" type="number" value="0" placeholder="إعفاءات إضافية">
<button class="send" onclick="calculateIncomeTax()">احسب الضريبة</button>
</div>
<div id="taxResult" class="result"></div>
<p class="small">الحاسبة تعليمية وليست استشارة ضريبية نهائية.</p>
`);
}

function calculateIncomeTax(){
let income=Number(document.getElementById("income").value||0);
let type=document.getElementById("incomeType").value;
let annual= type==="monthly" ? income*12 : income;
let personal=Number(document.getElementById("personalExemption").value||0);
let family=Number(document.getElementById("familyExemption").value||0);
let extra=Number(document.getElementById("extraExemption").value||0);
let exemptions=personal+family+extra;
if(exemptions>23000) exemptions=23000;
let taxable=Math.max(annual-exemptions,0);
let remaining=taxable;
let tax=0;
function bracket(amount,rate){
let part=Math.min(remaining,amount);
if(part>0){tax+=part*rate;remaining-=part;}
}
bracket(5000,.05);
bracket(5000,.10);
bracket(5000,.15);
bracket(5000,.20);
bracket(980000,.25);
if(remaining>0) tax+=remaining*.30;
let monthly=tax/12;
document.getElementById("taxResult").innerText=

/* ضريبة المبيعات */
function showSalesTax(){
layout("حاسبة ضريبة المبيعات", `
<div class="grid">
<div class="card">
<input id="sales" type="number" placeholder="المبيعات الخاضعة">
<input id="purchases" type="number" placeholder="المشتريات الخاضعة">
<input id="vatRate" type="number" value="16" placeholder="نسبة الضريبة">
<button class="send" onclick="calcVat()">احسب</button>
</div>
<div id="vatResult" class="result"></div>
</div>
`);
}

function calcVat(){
let s=Number(document.getElementById("sales").value||0);
let p=Number(document.getElementById("purchases").value||0);
let r=Number(document.getElementById("vatRate").value||0)/100;
let output=s*r;
let input=p*r;
let due=output-input;
document.getElementById("vatResult").innerText=
`ضريبة المخرجات: ${output.toFixed(2)}
ضريبة المدخلات: ${input.toFixed(2)}
الرصيد: ${Math.abs(due).toFixed(2)} ${due>=0?"مستحق للدائرة":"رصيد لصالح الشركة"}

قيد توريد الضريبة إن وجد:
من حـ/ ضريبة المبيعات المستحقة
إلى حـ/ البنك`;
}

/* البنك */
function showBank(){
layout("مذكرة تسوية البنك", `
<div class="card">
<input id="bankStatement" type="number" placeholder="الرصيد حسب كشف البنك">
<input id="outstandingCheques" type="number" placeholder="شيكات صادرة غير مصروفة">
<input id="depositsInTransit" type="number" placeholder="إيداعات بالطريق">
<input id="bookBalance" type="number" placeholder="الرصيد حسب الدفاتر">
<input id="bankFees" type="number" placeholder="عمولات بنكية غير مسجلة">
<input id="bankInterest" type="number" placeholder="فوائد/إيداعات غير مسجلة">
<button class="send" onclick="calcBank()">إعداد التسوية</button>
</div>
<div id="bankResult" class="result"></div>
`);
}

function calcBank(){
let bs=Number(document.getElementById("bankStatement").value||0);
let ch=Number(document.getElementById("outstandingCheques").value||0);
let dep=Number(document.getElementById("depositsInTransit").value||0);
let book=Number(document.getElementById("bookBalance").value||0);
let fees=Number(document.getElementById("bankFees").value||0);
let interest=Number(document.getElementById("bankInterest").value||0);
let adjustedBank=bs-ch+dep;
let adjustedBook=book-fees+interest;
document.getElementById("bankResult").innerText=
`الرصيد المعدل حسب البنك:
رصيد كشف البنك: ${bs.toFixed(2)}
ناقص شيكات صادرة غير مصروفة: ${ch.toFixed(2)}
زائد إيداعات بالطريق: ${dep.toFixed(2)}
الرصيد المعدل: ${adjustedBank.toFixed(2)}

الرصيد المعدل حسب الدفاتر:
رصيد الدفاتر: ${book.toFixed(2)}
ناقص عمولات بنكية: ${fees.toFixed(2)}
زائد فوائد/إيداعات غير مسجلة: ${interest.toFixed(2)}
الرصيد المعدل: ${adjustedBook.toFixed(2)}

الفرق بعد التسوية: ${(adjustedBank-adjustedBook).toFixed(2)}`;
}

/* التحليل المالي */
function showFinancialAnalysis(){
layout("التحليل المالي", `
<div class="card">
<input id="currentAssets" type="number" placeholder="الأصول المتداولة">
<input id="inventory" type="number" placeholder="المخزون">
<input id="currentLiabilities" type="number" placeholder="الخصوم المتداولة">
<input id="salesRevenue" type="number" placeholder="المبيعات">
<input id="netProfit" type="number" placeholder="صافي الربح">
<button class="send" onclick="calcAnalysis()">تحليل</button>
</div>
<div id="analysisResult" class="result"></div>
`);
}

function calcAnalysis(){
let ca=Number(document.getElementById("currentAssets").value||0);
let inv=Number(document.getElementById("inventory").value||0);
let cl=Number(document.getElementById("currentLiabilities").value||0);
let sales=Number(document.getElementById("salesRevenue").value||0);
let profit=Number(document.getElementById("netProfit").value||0);
let current=cl?ca/cl:0;
let quick=cl?(ca-inv)/cl:0;
let margin=sales?profit/sales*100:0;
document.getElementById("analysisResult").innerText=
`نسبة التداول: ${current.toFixed(2)}
نسبة السيولة السريعة: ${quick.toFixed(2)}
هامش صافي الربح: ${margin.toFixed(2)}%

قراءة سريعة:
- نسبة التداول أعلى من 1 غالباً مؤشر جيد للسيولة.
- هامش الربح يوضح نسبة الربح من المبيعات.
- يجب مقارنة النسب مع سنوات سابقة أو شركات مشابهة.`;
}
