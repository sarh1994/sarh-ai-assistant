<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>امتحان صرح</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma;
}

body{
background:#f4f4f4;
}

.container{
max-width:900px;
margin:30px auto;
padding:20px;
}

.card{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}

.question-image{
width:100%;
border-radius:15px;
margin-bottom:20px;
border:1px solid #ddd;
}

.option{
display:block;
margin-bottom:12px;
cursor:pointer;
}

.option input{
display:none;
}

.option span{
display:block;
padding:15px;
border:2px solid #ddd;
border-radius:12px;
background:white;
transition:.3s;
font-size:18px;
}

.option input:checked + span{
background:#7f1d1d;
color:white;
border-color:#7f1d1d;
}

.navigation{
margin-top:25px;
display:flex;
justify-content:space-between;
}

button{
background:#7f1d1d;
color:white;
border:none;
padding:12px 25px;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

.progress{
height:12px;
background:#ddd;
border-radius:999px;
margin-bottom:20px;
overflow:hidden;
}

.progress-bar{
height:100%;
width:20%;
background:#7f1d1d;
transition:.3s;
}

.page{
display:none;
}

.page.active{
display:block;
}

.result{
display:none;
margin-top:20px;
padding:20px;
background:#ecfdf5;
border-radius:12px;
font-size:20px;
text-align:center;
}

</style>
</head>
<body>

<div class="container">

<div class="progress">
<div class="progress-bar" id="bar"></div>
</div>

<form id="exam">

<!-- سؤال 1 -->

<div class="page active">

<div class="card">

<img src="images/q1.png" class="question-image">

<label class="option">
<input type="radio" name="q1" value="0">
<span>الخيار الأول</span>
</label>

<label class="option">
<input type="radio" name="q1" value="1">
<span>الخيار الثاني</span>
</label>

<label class="option">
<input type="radio" name="q1" value="2">
<span>الخيار الثالث</span>
</label>

<label class="option">
<input type="radio" name="q1" value="3">
<span>الخيار الرابع</span>
</label>

</div>

</div>

<!-- سؤال 2 -->

<div class="page">

<div class="card">

<img src="images/q2.jpg" class="question-image">

<label class="option">
<input type="radio" name="q2" value="0">
<span>الخيار الأول</span>
</label>

<label class="option">
<input type="radio" name="q2" value="1">
<span>الخيار الثاني</span>
</label>

<label class="option">
<input type="radio" name="q2" value="2">
<span>الخيار الثالث</span>
</label>

<label class="option">
<input type="radio" name="q2" value="3">
<span>الخيار الرابع</span>
</label>

</div>

</div>

<!-- سؤال 3 -->

<div class="page">

<div class="card">

<img src="images/q3.jpg" class="question-image">

<label class="option">
<input type="radio" name="q3" value="0">
<span>الخيار الأول</span>
</label>

<label class="option">
<input type="radio" name="q3" value="1">
<span>الخيار الثاني</span>
</label>

<label class="option">
<input type="radio" name="q3" value="2">
<span>الخيار الثالث</span>
</label>

<label class="option">
<input type="radio" name="q3" value="3">
<span>الخيار الرابع</span>
</label>

</div>

</div>

<!-- سؤال 4 -->

<div class="page">

<div class="card">

<img src="images/q4.jpg" class="question-image">

<label class="option">
<input type="radio" name="q4" value="0">
<span>الخيار الأول</span>
</label>

<label class="option">
<input type="radio" name="q4" value="1">
<span>الخيار الثاني</span>
</label>

<label class="option">
<input type="radio" name="q4" value="2">
<span>الخيار الثالث</span>
</label>

<label class="option">
<input type="radio" name="q4" value="3">
<span>الخيار الرابع</span>
</label>

</div>

</div>

<!-- سؤال 5 -->

<div class="page">

<div class="card">

<img src="images/q5.jpg" class="question-image">

<label class="option">
<input type="radio" name="q5" value="0">
<span>الخيار الأول</span>
</label>

<label class="option">
<input type="radio" name="q5" value="1">
<span>الخيار الثاني</span>
</label>

<label class="option">
<input type="radio" name="q5" value="2">
<span>الخيار الثالث</span>
</label>

<label class="option">
<input type="radio" name="q5" value="3">
<span>الخيار الرابع</span>
</label>

</div>

</div>

<div class="navigation">

<button type="button" onclick="prevPage()">
السابق
</button>

<button type="button" id="nextBtn" onclick="nextPage()">
التالي
</button>

<button type="button" id="submitBtn" onclick="submitExam()" style="display:none">
تسليم الامتحان
</button>

</div>

<div class="result" id="result"></div>

</form>

</div>

<script>

let page=0;

const pages=document.querySelectorAll(".page");

function showPage(){

pages.forEach(p=>p.classList.remove("active"));

pages[page].classList.add("active");

document.getElementById("bar").style.width=
((page+1)/pages.length*100)+"%";

document.getElementById("nextBtn").style.display=
page===pages.length-1 ? "none":"block";

document.getElementById("submitBtn").style.display=
page===pages.length-1 ? "block":"none";

}

function nextPage(){

if(page<pages.length-1){

page++;

showPage();

}

}

function prevPage(){

if(page>0){

page--;

showPage();

}

}

function submitExam(){

const answers={
q1:2,
q2:1,
q3:0,
q4:3,
q5:2
};

let score=0;

for(let q in answers){

const selected=document.querySelector(
`input[name="${q}"]:checked`
);

if(selected){

if(Number(selected.value)===answers[q]){

score++;

}

}

}

document.getElementById("result").style.display="block";

document.getElementById("result").innerHTML=
`النتيجة: ${score} / 5`;

window.scrollTo({
top:document.body.scrollHeight,
behavior:"smooth"
});

}

showPage();

</script>

</body>
</html>
