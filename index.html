function normalizeArabic(text){
return text
.replace(/[أإآ]/g,"ا")
.replace(/ة/g,"ه")
.replace(/ى/g,"ي")
.replace(/[ًٌٍَُِّْ]/g,"")
.toLowerCase();
}

function extractAmount(text){
let match = text.match(/\d+(\.\d+)?/);
return match ? match[0] : "____";
}

function searchKnowledge(question){
if(typeof accountingKnowledge === "undefined"){
return null;
}

let q = normalizeArabic(question);

for(let item of accountingKnowledge){
for(let keyword of item.keywords){
let k = normalizeArabic(keyword);
if(q.includes(k)){
return item.answer;
}
}
}

return null;
}

function findBestEntry(q){
let nq = normalizeArabic(q);
let best = null;
let bestScore = 0;

for(let item of smartEntries){
let score = 0;
for(let key of item.keys){
let nk = normalizeArabic(key);
if(nq.includes(nk)) score += 10;

let words = nk.split(" ");
for(let w of words){
if(w.length > 2 && nq.includes(w)) score += 1;
}
}
if(score > bestScore){
bestScore = score;
best = item;
}
}

return bestScore >= 2 ? best : null;
}

</div>

function calculateIncomeTax(){
let income=Number(document.getElementById("income").value||0);
let type=document.getElementById("incomeType").value;
let annual= type==="monthly" ? income*12 : income;
let personal=Number(document.getElementById("personalExemption").value||0);
let family=Number(document.getElementById("familyExemption").value||0);
let extra=Number(document.getElementById("extraExemption").value||0);
let exemptions=personal+family+extra;
if(exemptions>23000) exemptions=23000;
let taxable=Math.max(annual-exemptions,0);
let remaining=taxable;
let tax=0;
function bracket(amount,rate){
let part=Math.min(remaining,amount);
if(part>0){tax+=part*rate;remaining-=part;}
}
bracket(5000,.05);
bracket(5000,.10);
bracket(5000,.15);
bracket(5000,.20);
bracket(980000,.25);
if(remaining>0) tax+=remaining*.30;
let monthly=tax/12;
document.getElementById("taxResult").innerText=
`نوع الدخل: ${type==="monthly"?"شهري":"سنوي"}
الدخل السنوي المحتسب: ${annual.toFixed(2)}
إجمالي الإعفاءات المعتمدة: ${exemptions.toFixed(2)}
الدخل الخاضع للضريبة: ${taxable.toFixed(2)}

ضريبة الدخل السنوية: ${tax.toFixed(2)}
ضريبة الدخل الشهرية التقريبية: ${monthly.toFixed(2)}`;
}
